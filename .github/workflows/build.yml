name: Build APK

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Install Android SDK 36
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Sesame_Lite-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk

      # Release build — only runs on version tags (e.g. v1.0.0)
      # Requires three repository secrets:
      #   KEYSTORE_BASE64  — base64-encoded .jks file: base64 -i keystore.jks | pbcopy
      #   STORE_PASSWORD   — keystore password
      #   KEY_PASSWORD     — key password
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: mv app/build/outputs/apk/release/app-release.apk Sesame_Lite.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            Sesame_Lite.apk \
            --title "Sesame Lite ${{ github.ref_name }}"
